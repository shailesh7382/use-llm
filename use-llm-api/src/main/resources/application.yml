server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: use-llm-api
  datasource:
    url: jdbc:h2:mem:llmdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

# LLM Client config
llm:
  client:
    base-url: http://localhost:1234/v1
    api-key: lm-studio
    default-model: mistralai/devstral-small-2-2512
    timeout-seconds: 120
    max-retries: 3
    retry-delay-ms: 1000
    max-connections: 20

  # Memory config
  memory:
    max-messages: 20
    max-tokens: 4096
    strategy: TOKEN_AWARE
    system-prompt: "You are a helpful, knowledgeable, and concise AI assistant."
    persistent: true

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.usellm: DEBUG
    org.springframework.web: INFO
    reactor.netty: WARN
