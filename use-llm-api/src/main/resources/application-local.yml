# Override for local development with different LLM backends

# For LM Studio (default port 1234)
# llm.client.base-url: http://localhost:1234/v1
# llm.client.api-key: lm-studio
# llm.client.default-model: your-local-model

# For Ollama (default port 11434)
llm:
  client:
    base-url: http://localhost:1234/v1
    api-key: lm-studio
    default-model: mistralai/devstral-small-2-2512

logging:
  level:
    com.usellm: DEBUG
